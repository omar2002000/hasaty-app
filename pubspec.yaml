name: hasaty
description: تطبيق حصتي — إدارة الطلاب والحضور والاشتراكات (نسخة احترافية)
publish_to: 'none'
version: 4.0.0+4

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # =========================
  # State Management
  # =========================
  flutter_riverpod: ^2.5.1

  # =========================
  # Database & Storage
  # =========================
  sqflite: ^2.4.1
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3

  # =========================
  # UI & Utilities
  # =========================
  intl: ^0.19.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.1
  shimmer: ^3.0.0
  table_calendar: ^3.1.3

  # =========================
  # Communication & Sharing
  # =========================
  url_launcher: ^6.3.1
  share_plus: ^11.0.3
  file_picker: ^9.2.3

  # =========================
  # Security
  # =========================
  local_auth: ^2.3.0

  # =========================
  # Notifications
  # =========================
  flutter_local_notifications: ^18.0.1

  # =========================
  # Export (PDF + Excel)
  # =========================
  pdf: ^3.11.0
  printing: ^5.12.0
  excel: ^4.0.6

  # =========================
  # Animations & Fonts
  # =========================
  lottie: ^3.3.0
  flutter_staggered_animations: ^1.1.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # =========================
  # Assets
  # =========================
  assets:
    - assets/
    - assets/animations/
    - assets/images/
    - assets/fonts/

  # =========================
  # Fonts
  # =========================
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700