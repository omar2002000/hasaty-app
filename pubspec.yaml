name: hasaty
description: "تطبيق حصتي - مستر نصر علي"
publish_to: 'none'
version: 5.0.0+5

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  
  # قاعدة البيانات والتخزين
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  
  # واجهة المستخدم
  intl: ^0.19.0
  url_launcher: ^6.2.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.5
  
  # الأمان
  local_auth: ^2.1.8
  
  # الإشعارات
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  
  # المشاركة والتصدير
  share_plus: ^9.0.0
  excel: ^4.0.4
  pdf: ^3.10.7
  
  # HTTP والاتصال بالإنترنت
  http: ^1.2.0
  connectivity_plus: ^5.0.0
  
  # Google
  google_sign_in: ^6.1.5
  
  # الصوت
  
  # التقويم
  table_calendar: ^3.0.9
  
  # أنيميشن
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  lottie: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/animations/
    - assets/fonts/
  
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700